<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Categories</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/recipe.css') }}">
</head>

<body>

    <header>
        <div class="container">
            <h1>🍴 Delicious Recipes</h1>
            <nav>
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('recipe') }}">Recipes</a>
                <a href="{{ url_for('about') }}">About</a>
                <a href="{{ url_for('contact') }}">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>Recipe Categories</h2>
        <div class="categories">
            <a href="{{ url_for('recipe', category='Appetizer') }}"
                class="{% if category == 'Appetizer' %}active{% endif %}">
                Appetizer
            </a>
            <a href="{{ url_for('recipe', category='Main Course') }}"
                class="{% if category == 'Main Course' %}active{% endif %}">
                Main Course
            </a>
            <a href="{{ url_for('recipe', category='Desserts') }}"
                class="{% if category == 'Desserts' %}active{% endif %}">
                Desserts
            </a>
            <a href="{{ url_for('recipe', category='Drinks') }}" class="{% if category == 'Drinks' %}active{% endif %}">
                Drinks
            </a>
        </div>


        <!-- Display Recipes -->
        {% if recipes %}
        <div id="recipe-container" class="recipe-grid">
            {% for recipe in recipes %}
            <div class="recipe-item">
                <img src="{{ url_for('static', filename='images/' + recipe.image) }}" alt="{{ recipe.title }}">
                <h3>{{ recipe.title }}</h3>
                <div class="card-buttons">
                    <a href="{{ url_for('recipe_details', recipe_id=recipe.id) }}" class="btn-view">View Recipe</a>
                    <a href="{{ url_for('like_recipe', recipe_id=recipe.id) }}" class="btn-like">Like</a>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p>No recipes available.</p>
        {% endif %}


    </main>

</body>

</html>
