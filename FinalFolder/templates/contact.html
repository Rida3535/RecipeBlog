<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Taste Tales</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
</head>
<body>
    <header>
        <div class="container">
        <!-- Logo and Title -->
        <div class="logo-title">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo" width="40"
                height="59">
            <h1>Ricette Deliziose</h1>
        </div>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('recipe') }}">Recipes</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contact') }}">Contact</a>

            {% if 'user_id' in session %}
                {% if session['is_admin'] %}
                <!-- Admin View -->
                <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                <a href="{{ url_for('logout') }}">Logout</a>
                {% else %}
                <!-- Regular User View -->
                <a href="{{ url_for('profile') }}">Profile</a>
                <a href="{{ url_for('logout') }}">Logout</a>
                {% endif %}
                {% else %}
                <!-- Not Logged In -->
                <a href="{{ url_for('login') }}">Login</a>
                {% endif %}
        </nav>
         </div>
    </header>
    
    <main>
        <section id="contact-form">
            <form action="{{ url_for('contact') }}" method="POST">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Taste Tales. All rights reserved.</p>
    </footer>
</body>
</html>
